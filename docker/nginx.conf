server {
    listen 10003;
    listen [::]:10003;
    server_name _;
    absolute_redirect off;
    port_in_redirect off;

    location = / {
        return 301 /bW9ycGhl/;
    }

    location = /bW9ycGhl {
        return 301 /bW9ycGhl/;
    }

    location /bW9ycGhl/ {
        alias /srv/public/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        types {
            application/vnd.android.package-archive apk;
        }
    }
}
